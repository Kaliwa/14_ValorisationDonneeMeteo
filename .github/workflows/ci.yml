name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-24.04
    services:
      timescaledb:
        image: timescale/timescaledb:2.25.0-pg17
        env:
          POSTGRES_DB: meteodb
          POSTGRES_USER: infoclimat
          POSTGRES_PASSWORD: infoclimat2026
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U infoclimat -d meteodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DEBUG: "false"
      SECRET_KEY: ci-secret-key
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_NAME: meteodb
      DB_USER: infoclimat
      DB_PASSWORD: infoclimat2026

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Run backend tests
        working-directory: backend
        run: |
          mkdir -p test-results
          uv run pytest \
            --junitxml=test-results/pytest.xml

      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/test-results/pytest.xml
          if-no-files-found: warn

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --frozen --extra dev

      - name: Run Ruff
        working-directory: backend
        run: |
          mkdir -p lint-results
          uv run ruff check . | tee lint-results/ruff.txt

      - name: Upload backend lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-lint-report
          path: backend/lint-results/ruff.txt
          if-no-files-found: warn

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: frontend
        run: |
          mkdir -p lint-results
          npm run lint | tee lint-results/eslint.txt

      - name: Upload frontend lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-report
          path: frontend/lint-results/eslint.txt
          if-no-files-found: warn

  security-scan:
    name: Security Scan
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          if-no-files-found: warn

  docker-build:
    name: Docker Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: 14_valorisationdonneemeteo-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: 14_valorisationdonneemeteo-frontend:ci
